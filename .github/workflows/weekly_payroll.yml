name: Weekly Payroll Sync

on:
  schedule:
    # Monday 1:00am AEST (Darwin UTC+9:30 = Sunday 15:30 UTC)
    - cron: '30 15 * * 0'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      GHL_API_KEY:            ${{ secrets.GHL_API_KEY }}
      GHL_LOCATION_ID:        ${{ secrets.GHL_LOCATION_ID }}
      ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
      FRESHA_EMAIL:           ${{ secrets.FRESHA_EMAIL }}
      FRESHA_PASSWORD:        ${{ secrets.FRESHA_PASSWORD }}
      CAIRNS_FRESHA_EMAIL:    ${{ secrets.CAIRNS_FRESHA_EMAIL }}
      CAIRNS_FRESHA_PASSWORD: ${{ secrets.CAIRNS_FRESHA_PASSWORD }}
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Write session files from secrets
        run: |
          mkdir -p data
          echo "${{ secrets.NT_SESSION_JSON }}" | base64 --decode > data/session.json
          echo "${{ secrets.CAIRNS_SESSION_JSON }}" | base64 --decode > data/session_cairns.json

      - name: Run fetch_hours.py
        run: python agent/fetch_hours.py

      - name: Run fetch_performance.py
        run: python agent/fetch_performance.py

      - name: Write dashboard JSON snapshot
        run: python agent/write_dashboard_json.py

      - name: Push dashboard JSON to dashboard repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:$GH_TOKEN@github.com/andrewmcdevitt-stack/diamond-barbers-dashboard.git /tmp/dashboard
          mkdir -p /tmp/dashboard/data
          cp data/performance_summary.json /tmp/dashboard/data/performance_summary.json
          cp data/cairns_performance_summary.json /tmp/dashboard/data/cairns_performance_summary.json
          cd /tmp/dashboard
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/performance_summary.json data/cairns_performance_summary.json
          git diff --staged --quiet || git commit -m "Update dashboard snapshot $(date -u +%Y-%m-%d)"
          git push

      - name: Save refreshed sessions back to GitHub Secrets
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f data/session.json ]; then
            jq '{cookies: .cookies}' data/session.json > /tmp/session_slim.json
            base64 -w 0 /tmp/session_slim.json | gh secret set NT_SESSION_JSON --repo ${{ github.repository }}
          fi
          if [ -f data/session_cairns.json ]; then
            jq '{cookies: .cookies}' data/session_cairns.json > /tmp/session_cairns_slim.json
            base64 -w 0 /tmp/session_cairns_slim.json | gh secret set CAIRNS_SESSION_JSON --repo ${{ github.repository }}
          fi
