name: Weekly Payroll Sync

# Manual only — triggered by hand from the Actions tab (or `gh workflow run`) so
# the report download can be watched and any popup/cookie-banner changes caught
# before they silently break the sync. Cron schedule intentionally removed.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GHL_API_KEY:            ${{ secrets.GHL_API_KEY }}
      GHL_LOCATION_ID:        ${{ secrets.GHL_LOCATION_ID }}
      ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
      FRESHA_EMAIL:           ${{ secrets.FRESHA_EMAIL }}
      FRESHA_PASSWORD:        ${{ secrets.FRESHA_PASSWORD }}
      CAIRNS_FRESHA_EMAIL:    ${{ secrets.CAIRNS_FRESHA_EMAIL }}
      CAIRNS_FRESHA_PASSWORD: ${{ secrets.CAIRNS_FRESHA_PASSWORD }}
      EMAIL_HOST:             ${{ secrets.EMAIL_HOST }}
      EMAIL_PASSWORD:         ${{ secrets.EMAIL_PASSWORD }}
      XERO_CLIENT_ID:         ${{ secrets.XERO_CLIENT_ID }}
      XERO_CLIENT_SECRET:     ${{ secrets.XERO_CLIENT_SECRET }}
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          playwright install chromium --with-deps

      - name: Write session files from secrets
        run: |
          mkdir -p data
          echo "${{ secrets.NT_SESSION_JSON }}" | base64 --decode > data/session.json
          echo "${{ secrets.CAIRNS_SESSION_JSON }}" | base64 --decode > data/session_cairns.json
          echo "${{ secrets.XERO_TOKEN_B64 }}" | base64 --decode > data/xero_token.json

      - name: Run weekly sync (hours + performance -> GHL + hours/bonus JSON)
        run: python agent/weekly_sync.py

      - name: Create Xero draft pay runs with hours, tips, commissions and bonus
        run: python agent/xero_create_payrun.py

      - name: Save updated Xero token back to secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f data/xero_token.json ]; then
            TOKEN_B64=$(base64 -w 0 data/xero_token.json)
            gh secret set XERO_TOKEN_B64 --body "$TOKEN_B64" --repo ${{ github.repository }}
          fi

      - name: Commit and push updated JSON files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add data/performance_summary.json data/cairns_performance_summary.json \
                  data/fresha_hours_nt.json data/fresha_hours_qld.json \
                  data/night_markets_bonus.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: weekly sync $(date -u +'%Y-%m-%d')" &&
            git push
          )

      - name: Save refreshed sessions back to secrets
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f data/session.json ]; then
            jq '{cookies: .cookies}' data/session.json > /tmp/session_slim.json
            base64 -w 0 /tmp/session_slim.json | gh secret set NT_SESSION_JSON --repo ${{ github.repository }}
          fi
          if [ -f data/session_cairns.json ]; then
            jq '{cookies: .cookies}' data/session_cairns.json > /tmp/session_cairns_slim.json
            base64 -w 0 /tmp/session_cairns_slim.json | gh secret set CAIRNS_SESSION_JSON --repo ${{ github.repository }}
          fi
