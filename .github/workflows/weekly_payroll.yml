name: Weekly Payroll Sync

on:
  schedule:
    # Monday 6:00 AM Darwin time (UTC+9:30) = Sunday 20:30 UTC
    - cron: '30 20 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GHL_API_KEY:            ${{ secrets.GHL_API_KEY }}
      GHL_LOCATION_ID:        ${{ secrets.GHL_LOCATION_ID }}
      ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
      FRESHA_EMAIL:           ${{ secrets.FRESHA_EMAIL }}
      FRESHA_PASSWORD:        ${{ secrets.FRESHA_PASSWORD }}
      CAIRNS_FRESHA_EMAIL:    ${{ secrets.CAIRNS_FRESHA_EMAIL }}
      CAIRNS_FRESHA_PASSWORD: ${{ secrets.CAIRNS_FRESHA_PASSWORD }}
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          playwright install chromium --with-deps

      - name: Write session files from secrets
        run: |
          mkdir -p data
          echo "${{ secrets.NT_SESSION_JSON }}" | base64 --decode > data/session.json
          echo "${{ secrets.CAIRNS_SESSION_JSON }}" | base64 --decode > data/session_cairns.json

      - name: Run weekly sync (hours + performance -> GHL + dashboard JSON)
        run: python agent/weekly_sync.py

      - name: Commit and push updated dashboard JSON
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add data/performance_summary.json data/cairns_performance_summary.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: weekly sync $(date -u +'%Y-%m-%d')" &&
            git push
          )

      - name: Save refreshed sessions back to secrets
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f data/session.json ]; then
            jq '{cookies: .cookies}' data/session.json > /tmp/session_slim.json
            base64 -w 0 /tmp/session_slim.json | gh secret set NT_SESSION_JSON --repo ${{ github.repository }}
          fi
          if [ -f data/session_cairns.json ]; then
            jq '{cookies: .cookies}' data/session_cairns.json > /tmp/session_cairns_slim.json
            base64 -w 0 /tmp/session_cairns_slim.json | gh secret set CAIRNS_SESSION_JSON --repo ${{ github.repository }}
          fi
