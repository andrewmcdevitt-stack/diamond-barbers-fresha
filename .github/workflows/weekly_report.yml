name: Weekly Fresha Report

on:
  schedule:
    - cron: "30 20 * * 0"
  workflow_dispatch:

jobs:
  extract-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent/requirements.txt

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Install virtual display
        run: sudo apt-get install -y xvfb

      - name: Decode session
        env:
          FRESHA_SESSION: ${{ secrets.FRESHA_SESSION }}
        run: echo "$FRESHA_SESSION" | base64 -d > data/session.json

      - name: Run Fresha agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRESHA_EMAIL: ${{ secrets.FRESHA_EMAIL }}
          FRESHA_PASSWORD: ${{ secrets.FRESHA_PASSWORD }}
          DISPLAY: ":99"
        run: xvfb-run --auto-servernum python agent/fresha_agent.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add data/
          git diff --staged --quiet && echo "No changes to commit." || (
            git commit -m "chore: weekly report $(date -u +'%Y-%m-%d')" &&
            git push
          )
