name: Weekly Fresha Report

on:
  schedule:
    # 20:30 UTC Sunday = 6:00 AM Monday Darwin time (UTC+9:30)
    - cron: "30 20 * * 0"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  extract-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent/requirements.txt

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Fetch performance data (NT + QLD)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRESHA_EMAIL: ${{ secrets.FRESHA_EMAIL }}
          FRESHA_PASSWORD: ${{ secrets.FRESHA_PASSWORD }}
          CAIRNS_FRESHA_EMAIL: ${{ secrets.CAIRNS_FRESHA_EMAIL }}
          CAIRNS_FRESHA_PASSWORD: ${{ secrets.CAIRNS_FRESHA_PASSWORD }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python agent/fetch_performance.py

      - name: Fetch hours data (NT + QLD)
        env:
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python agent/fetch_hours.py

      - name: Generate Xero payroll report
        env:
          XERO_CLIENT_ID: ${{ secrets.XERO_CLIENT_ID }}
          XERO_CLIENT_SECRET: ${{ secrets.XERO_CLIENT_SECRET }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python agent/xero_payroll_report.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add data/
          git diff --staged --quiet && echo "No changes to commit." || (
            git commit -m "chore: weekly report $(date -u +'%Y-%m-%d')" &&
            git push
          )
